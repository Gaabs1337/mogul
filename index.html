<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>MOGUL — Build your empire</title>
  <meta name="description" content="MOGUL — a premium idle business tycoon. Build your empire from a lemonade stand to the stars." />
  <meta name="theme-color" content="#08090c" />

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MOGUL" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="manifest" href="manifest.webmanifest" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <header id="topbar">
      <div class="topbar-row">
        <div class="brand"><span class="brand-mark">M</span>OGUL</div>
        <button class="icon-btn" data-action="tab" data-tab="settings" aria-label="Settings">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
      </div>

      <button id="hustle" class="hustle" aria-label="Hustle for cash">
        <div class="hustle-ring"></div>
        <div class="networth-wrap">
          <div class="networth" id="networth">$0</div>
          <div class="rate" id="rate">$0/s</div>
          <div class="era" id="era-chip"></div>
        </div>
        <div class="combo" id="combo" aria-hidden="true"></div>
      </button>

      <div class="meta-badges" id="meta-badges">
        <div class="badge" id="badge-investors" hidden>
          <span class="badge-icon">😇</span><span class="badge-val" id="investors-val">0</span>
          <span class="badge-label">Investors</span>
        </div>
        <div class="badge" id="badge-legacy" hidden>
          <span class="badge-icon">👑</span><span class="badge-val" id="legacy-val">0</span>
          <span class="badge-label">Legacy</span>
        </div>
        <div class="badge badge-insight" id="badge-insight" hidden>
          <span class="badge-icon">💡</span><span class="badge-val" id="insight-val">0</span>
          <span class="badge-label">Insight</span>
        </div>
        <div class="badge badge-mult">
          <span class="badge-icon">✦</span><span class="badge-val" id="mult-val">×1</span>
          <span class="badge-label">Profit</span>
        </div>
      </div>
    </header>

    <main id="view">
      <section class="tab-panel" data-panel="empire"></section>
      <section class="tab-panel" data-panel="upgrades" hidden></section>
      <section class="tab-panel" data-panel="rnd" hidden></section>
      <section class="tab-panel" data-panel="board" hidden></section>
      <section class="tab-panel" data-panel="trophies" hidden></section>
      <section class="tab-panel" data-panel="settings" hidden></section>
    </main>

    <nav id="tabbar">
      <button class="tab-btn is-active" data-action="tab" data-tab="empire">
        <svg viewBox="0 0 24 24" class="tab-ico" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 21h18M5 21V7l5-4 5 4v14M9 21v-4h2v4M19 21V11l-4-3"/></svg>
        <span>Empire</span>
      </button>
      <button class="tab-btn" data-action="tab" data-tab="upgrades">
        <svg viewBox="0 0 24 24" class="tab-ico" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
        <span>Upgrades</span>
      </button>
      <button class="tab-btn" data-action="tab" data-tab="rnd" id="tab-rnd" hidden>
        <svg viewBox="0 0 24 24" class="tab-ico" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M9 18h6M10 22h4M12 2a7 7 0 0 0-4 12.7c.6.5 1 1.3 1 2.3h6c0-1 .4-1.8 1-2.3A7 7 0 0 0 12 2z"/></svg>
        <span>R&amp;D</span>
        <i class="tab-dot" id="dot-rnd" hidden></i>
      </button>
      <button class="tab-btn" data-action="tab" data-tab="board">
        <svg viewBox="0 0 24 24" class="tab-ico" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="7" width="18" height="13" rx="2"/><path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
        <span>Board</span>
        <i class="tab-dot" id="dot-board" hidden></i>
      </button>
      <button class="tab-btn" data-action="tab" data-tab="trophies">
        <svg viewBox="0 0 24 24" class="tab-ico" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M6 4h12v3a6 6 0 0 1-12 0V4zM6 6H3v1a3 3 0 0 0 3 3M18 6h3v1a3 3 0 0 1-3 3M9 18h6M12 13v5"/></svg>
        <span>Trophies</span>
        <i class="tab-dot" id="dot-trophies" hidden></i>
      </button>
      <button class="tab-btn" data-action="tab" data-tab="settings">
        <svg viewBox="0 0 24 24" class="tab-ico" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 0 0-.1-1.2l2-1.6-2-3.4-2.4 1a7 7 0 0 0-2-1.2L14 3h-4l-.5 2.4a7 7 0 0 0-2 1.2l-2.4-1-2 3.4 2 1.6A7 7 0 0 0 5 12a7 7 0 0 0 .1 1.2l-2 1.6 2 3.4 2.4-1a7 7 0 0 0 2 1.2L10 21h4l.5-2.4a7 7 0 0 0 2-1.2l2.4 1 2-3.4-2-1.6A7 7 0 0 0 19 12z"/></svg>
        <span>More</span>
      </button>
    </nav>
  </div>

  <div id="fx" aria-hidden="true"></div>
  <div id="toast-root" aria-live="polite"></div>
  <div id="modal-root"></div>

  <script src="js/format.js"></script>
  <script src="js/data.js"></script>
  <script src="js/state.js"></script>
  <script src="js/game.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
